<!DOCTYPE html>
<html>
<head>
    <title>City Search Engine</title>
</head>
<body>

<h1>City Search Engine</h1>

<!-- Search Form -->
<form action="{% url 'search_results' %}" method="get">
    <input name="q" type="text" placeholder="Search..."><br>
    <button>Search</button>
</form>

<!-- City List -->
<ul>
    {% for city in cities %}
    <li>{{ city.name }} - {{ city.state }}</li>
    {% endfor %}
</ul>

</body>
</html>
